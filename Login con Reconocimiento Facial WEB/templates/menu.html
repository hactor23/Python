{% extends "base_menu.html" %}
{% block title %}Menú principal{% endblock %}
{% block body %}
<main class="container">
  <header class="header">
    <h1>Menú principal</h1>
    <p class="muted">Bienvenido <strong>{{ username }}</strong></p>
  </header>

  <section class="card grid-actions">
    <a class="tile tile-primary" href="{{ url_for('accesos') }}">
      <span class="tile-title">Control de accesos</span>
      <span class="tile-desc">Ver tus ingresos y registros</span>
    </a>
    <a class="tile" href="{{ url_for('reportes') }}">
      <span class="tile-title">Reportes</span>
      <span class="tile-desc">Resumen por día (sistema)</span>
    </a>
  </section>
</main>
{% endblock %}
