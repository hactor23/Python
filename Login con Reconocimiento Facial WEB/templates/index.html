<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login Facial (Web)</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  </head>
  <body>
    <main class="container">
      <header class="header">
        <h1>Login Facial (Web)</h1>
        <p class="muted">Registro y acceso usando la cámara del navegador + Flask.</p>
      </header>

      <section class="card">
        <label class="label" for="username">Usuario</label>
        <input id="username" class="input" placeholder="Ej: ariel" autocomplete="username" />

        <div class="row">
          <button id="btnRegister" class="btn primary">Registrar</button>
          <button id="btnLogin" class="btn">Ingresar</button>
        </div>

        <p id="status" class="status muted"></p>
      </section>

      <section class="card">
        <div class="videoWrap">
          <video id="video" playsinline autoplay muted></video>
          <canvas id="canvas" width="640" height="480" hidden></canvas>
        </div>
        <p class="help muted">
          Si el navegador pide permisos, aceptá el acceso a la cámara. Para mejor detección, buena luz frontal.
        </p>
      </section>
    </main>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
  </body>
</html>
