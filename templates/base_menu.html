<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Login Facial{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  </head>
  <body>
    <nav class="topnav">
      <a class="brand" href="{{ url_for('menu') }}">Login Facial</a>
      <div class="nav-links">
        <a href="{{ url_for('menu') }}">Inicio</a>
        <a href="{{ url_for('accesos') }}">Control de accesos</a>
        <a href="{{ url_for('reportes') }}">Reportes</a>
        <form method="post" action="{{ url_for('logout') }}" class="nav-logout">
          <button type="submit" class="link-btn">Cerrar sesión</button>
        </form>
      </div>
    </nav>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="container flash-wrap">
          {% for category, message in messages %}
            <div class="flash flash-{{ category }}">{{ message }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    {% block body %}{% endblock %}
  </body>
</html>
